<mat-toolbar class="np-main-toolbar" role="banner">

  <!-- Hamburger menu (mobile / tablet) -->
  <button
    mat-icon-button
    class="toolbar__menu-btn"
    (click)="toggleSidenav.emit()"
    aria-label="Abrir/cerrar menú de navegación"
  >
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Brand -->
  <div class="toolbar__brand">
    <mat-icon class="toolbar__brand-icon">local_pharmacy</mat-icon>
    <span class="toolbar__brand-name">Nature-Pharma</span>
  </div>

  <!-- Spacer -->
  <span class="np-spacer"></span>

  <!-- User profile menu -->
  @if (currentUser()) {
    <button
      mat-button
      class="toolbar__user-btn"
      [matMenuTriggerFor]="userMenu"
      aria-label="Menú de usuario"
      aria-haspopup="true"
    >
      <!-- Avatar circle -->
      <div class="toolbar__avatar" aria-hidden="true">
        {{ userInitials }}
      </div>
      <span class="toolbar__username">{{ currentUser()?.firstName }}</span>
      <mat-icon class="toolbar__caret">arrow_drop_down</mat-icon>
    </button>
  }

  <!-- User dropdown menu -->
  <mat-menu #userMenu="matMenu" class="np-user-menu" xPosition="before">

    <!-- User info header -->
    <div class="user-menu__header" (click)="$event.stopPropagation()">
      <div class="user-menu__avatar">{{ userInitials }}</div>
      <div class="user-menu__info">
        <span class="user-menu__name">{{ userFullName }}</span>
        <span class="user-menu__dept">{{ departmentLabel }}</span>
        <span class="user-menu__role">{{ roleLabel }}</span>
      </div>
    </div>

    <mat-divider></mat-divider>

    <!-- Menu actions -->
    <button mat-menu-item disabled aria-label="Perfil (próximamente)">
      <mat-icon>account_circle</mat-icon>
      <span>Mi perfil</span>
    </button>

    <button mat-menu-item disabled aria-label="Configuración (próximamente)">
      <mat-icon>settings</mat-icon>
      <span>Configuración</span>
    </button>

    <mat-divider></mat-divider>

    <button mat-menu-item class="user-menu__logout" (click)="logout()" aria-label="Cerrar sesión">
      <mat-icon>logout</mat-icon>
      <span>Cerrar sesión</span>
    </button>

  </mat-menu>

</mat-toolbar>
